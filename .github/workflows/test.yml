name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  node:
    concurrency:
      cancel-in-progress: ${{ github.ref_name != 'main' }}
      group: ${{ github.workflow }}-node-${{ matrix.node-version }}-${{ github.event.pull_request.number || github.sha }}

    name: Node.js v${{ matrix.node-version }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run docker compose
        run: docker compose up -d

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: true

      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: pnpm i

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  deno:
    concurrency:
      cancel-in-progress: ${{ github.ref_name != 'main' }}
      group: ${{ github.workflow }}-deno-${{ matrix.deno-version }}-${{ github.event.pull_request.number || github.sha }}

    name: Deno
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # https://endoflife.date/deno
        deno-version: [2.5.x, 2.7.x]

    steps:
      - name: harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: spin up databases
        run: docker compose up -d

      - name: install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: true

      - name: use node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: use deno ${{ matrix.deno-version }}
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: install dependencies
        run: pnpm install

      - name: build
        run: pnpm build

      - name: lint for deno/jsr
        run: pnpm lint:deno

  jsr:
    concurrency:
      cancel-in-progress: ${{ github.ref_name != 'main' }}
      group: ${{ github.workflow }}-jsr-${{ github.event.pull_request.number || github.sha }}

    name: JSR
    runs-on: ubuntu-latest

    steps:
      - name: harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: true

      - name: use node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: install dependencies
        run: pnpm i

      - name: dry-run jsr publish
        run: pnpm jsr publish --allow-dirty --dry-run
